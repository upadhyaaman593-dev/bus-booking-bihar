<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Select Seat - {{ bus.bus_name }}</title>
    <style>
        .seat-container { max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .deck-header { font-weight: bold; color: #555; background: #f8f9fa; padding: 5px 10px; border-radius: 5px; margin: 15px 0 10px 0; font-size: 0.9rem; text-align: center; border: 1px solid #eee; }
        .bus-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .seat { height: 45px; border: 1px solid #ddd; border-radius: 8px; text-align: center; line-height: 45px; cursor: pointer; font-weight: bold; font-size: 0.85rem; background-color: #fff; position: relative; }
        
        .booked { background-color: #dee2e6 !important; color: #adb5bd; cursor: not-allowed; border: none !important; }
        .selected { background-color: #0d6efd !important; color: white !important; border: none !important; }
        
        /* WINDOW SEAT STYLE - Isko forcing apply kar rahe hain */
        .window-seat { border: 2px solid #0d6efd !important; background-color: #f0f7ff !important; color: #0d6efd !important; }
        
        .legend { display: flex; justify-content: space-around; margin-top: 25px; font-size: 0.75rem; }
        .legend-box { width: 12px; height: 12px; display: inline-block; border-radius: 3px; margin-right: 4px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="seat-container">
        <h5 class="fw-bold text-center">{{ bus.bus_name }}</h5>
        
        <div class="deck-header">LOWER DECK</div>
        <div class="bus-grid mb-4">
            {% for i in range(1, 21) %}
                {% set s_id = i|string %}
                <div id="seat-{{ s_id }}" 
                     class="seat {% if s_id in booked_seats %} booked {% endif %} {% if s_id in window_seats %} window-seat {% endif %}"
                     onclick="selectSeat('{{ s_id }}')">
                    {{ s_id }}
                </div>
            {% endfor %}
        </div>

        <div class="deck-header">UPPER DECK</div>
        <div class="bus-grid">
            {% for i in range(21, 41) %}
                {% set s_id = i|string %}
                <div id="seat-{{ s_id }}" 
                     class="seat {% if s_id in booked_seats %} booked {% endif %} {% if s_id in window_seats %} window-seat {% endif %}"
                     onclick="selectSeat('{{ s_id }}')">
                    {{ s_id }}
                </div>
            {% endfor %}
        </div>

        <div class="legend mt-4">
            <div><span class="legend-box border"></span> Available</div>
            <div><span class="legend-box window-seat" style="border: 2px solid #0d6efd; background:#f0f7ff"></span> Window</div>
            <div><span class="legend-box booked"></span> Booked</div>
        </div>

        <form action="/process_booking" method="POST" class="mt-4 border-top pt-4">
            <input type="hidden" name="bus_id" value="{{ bus.id }}">
            <input type="hidden" name="seat_no" id="selected_seat" required>
            <div class="mb-3">
                <label class="form-label small fw-bold">Passenger Name</label>
                <input type="text" name="p_name" class="form-control" placeholder="Enter full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Mobile Number</label>
                <input type="number" name="p_mobile" class="form-control" placeholder="10 digit mobile" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">CONFIRM & GENERATE TICKET</button>
        </form>
    </div>
</div>

<script>
    function selectSeat(id) {
        let seatEl = document.getElementById('seat-' + id);
        if (seatEl.classList.contains('booked')) return;
        document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
        seatEl.classList.add('selected');
        document.getElementById('selected_seat').value = id;
    }
</script>
</body>
</html>
