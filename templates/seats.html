<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Select Seats - {{ bus.bus_name }}</title>
    <style>
        .seat-container { display: flex; flex-wrap: wrap; max-width: 350px; margin: 0 auto; }
        .seat { 
            width: 45px; height: 45px; margin: 6px; 
            border: 1px solid #ced4da; border-radius: 8px;
            cursor: pointer; text-align: center; line-height: 45px;
            font-weight: bold; font-size: 0.9rem; transition: 0.2s;
        }
        .seat:hover { background-color: #f0f0f0; }
        .booked { background-color: #dee2e6 !important; color: #adb5bd; cursor: not-allowed; border: none; }
        .selected { background-color: #28a745 !important; color: white; border-color: #28a745; }
        
        /* WINDOW SEAT STYLE: Blue border and background */
        .window-seat { border: 2px solid #0d6efd !important; background-color: #e7f1ff; color: #0d6efd; }
        
        .legend { display: flex; justify-content: center; gap: 15px; font-size: 0.8rem; margin-top: 20px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm border-0 rounded-4 p-4 mx-auto" style="max-width: 500px;">
        <h4 class="fw-bold mb-1">{{ bus.bus_name }}</h4>
        <p class="text-muted small mb-4">{{ bus.route_from }} ➔ {{ bus.route_to }} | ₹{{ bus.fare }}</p>

        <div class="seat-container">
            {% for i in range(1, 31) %}
                {% set s_no = i|string %}
                <div class="seat 
                    {% if s_no in booked_seats %} booked 
                    {% elif s_no in window_seats %} window-seat 
                    {% endif %}" 
                    onclick="selectSeat('{{ s_no }}', this)">
                    {{ s_no }}
                </div>
            {% endfor %}
        </div>

        <div class="legend">
            <div class="legend-item"><div class="seat" style="width:15px;height:15px;margin:0;"></div> Available</div>
            <div class="legend-item"><div class="seat window-seat" style="width:15px;height:15px;margin:0;"></div> Window</div>
            <div class="legend-item"><div class="seat booked" style="width:15px;height:15px;margin:0;"></div> Booked</div>
        </div>

        <form action="/process_booking" method="POST" class="mt-4">
            <input type="hidden" name="bus_id" value="{{ bus.id }}">
            <input type="hidden" name="seat_no" id="seat_input" required>
            <input type="hidden" name="fare" value="{{ bus.fare }}">

            <div class="mb-3">
                <input type="text" name="p_name" class="form-control" placeholder="Passenger Name" required>
            </div>
            <div class="mb-3">
                <input type="number" name="p_mobile" class="form-control" placeholder="Mobile Number" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">CONFIRM SEAT</button>
        </form>
    </div>
</div>

<script>
    function selectSeat(id, el) {
        if(el.classList.contains('booked')) return;
        document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('seat_input').value = id;
    }
</script>

</body>
</html>
