<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        .bus-container { background: white; padding: 15px; border-radius: 10px; border: 2px solid #333; max-width: 450px; margin: auto; }
        .deck-label { font-weight: bold; margin-top: 10px; display: block; background: #eee; padding: 5px; border-radius: 5px; }
        .seat { width: 45px; height: 45px; margin: 4px; font-size: 11px; border-radius: 6px; display: flex; align-items: center; justify-content: center; border: 1px solid #ccc; cursor: pointer; font-weight: bold; background: #fff; }
        .window { border-bottom: 4px solid #0d6efd; }
        .booked { background: #dc3545 !important; color: white !important; cursor: not-allowed; }
        #bookingForm { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; background: white; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 10px; width: 90%; max-width: 350px; }
    </style>
</head>
<body class="container py-4 bg-light text-center">
    <h5 class="fw-bold">{{ bus['bus_name'] }}</h5>
    <div class="bus-container shadow-sm mb-4">
        <span class="deck-label mb-2">Lower Deck</span>
        <div class="d-flex flex-wrap justify-content-center">
            {% for s in range(1, bus['lower_count'] + 1) %}
                <div class="seat {% if s|string in booked_seats %}booked{% endif %} {% if s|string in windows %}window{% endif %}"
                     onclick="if(!this.classList.contains('booked')) openBooking('{{ s }}')">{{ s }}</div>
            {% endfor %}
        </div>
        <span class="deck-label my-2">Upper Deck</span>
        <div class="d-flex flex-wrap justify-content-center">
            {% for s in range(1, bus['upper_count'] + 1) %}
                {% set u_seat = 'U' ~ s %}
                <div class="seat {% if u_seat in booked_seats %}booked{% endif %} {% if u_seat in windows %}window{% endif %}"
                     onclick="if(!this.classList.contains('booked')) openBooking('{{ u_seat }}')">{{ u_seat }}</div>
            {% endfor %}
        </div>
    </div>

    <div id="bookingForm" class="card">
        <h5 class="fw-bold">Seat <span id="selectedSeatDisplay"></span> Details</h5>
        <input type="text" id="p_name" class="form-control mb-2" placeholder="Yatri Name" required>
        <input type="number" id="p_mobile" class="form-control mb-3" placeholder="Mobile Number" required>
        <button class="btn btn-primary w-100 mb-2" onclick="payNow()">PAY ONLINE (₹{{ bus['fare'] }})</button>
        <button class="btn btn-outline-secondary w-100" onclick="closeBooking()">Cancel</button>
    </div>

    <form id="finalForm" action="/process_booking" method="POST" style="display:none;">
        <input type="hidden" name="bus_id" value="{{ bus['id'] }}">
        <input type="hidden" name="seat_no" id="form_seat">
        <input type="hidden" name="p_name" id="form_name">
        <input type="hidden" name="p_mobile" id="form_mobile">
        <input type="hidden" name="pay_id" id="form_payid">
        <input type="hidden" name="mode" value="Online">
    </form>

    <script>
        let currentSeat = '';
        function openBooking(s) { currentSeat = s; document.getElementById('selectedSeatDisplay').innerText = s; document.getElementById('bookingForm').style.display = 'block'; }
        function closeBooking() { document.getElementById('bookingForm').style.display = 'none'; }
        
        function payNow() {
            let name = document.getElementById('p_name').value, mob = document.getElementById('p_mobile').value;
            if(!name || !mob) return alert("Details bhariye!");

            var options = {
                "key": "rzp_test_SfZGVCKtrNQYsX", // Jab Razorpay Live ho jaye, tab rzp_live_... yahan dalein
                "amount": "{{ bus['fare'] }}" * 100,
                "handler": function (res){
                    document.getElementById('form_seat').value = currentSeat;
                    document.getElementById('form_name').value = name;
                    document.getElementById('form_mobile').value = mob;
                    document.getElementById('form_payid').value = res.razorpay_payment_id;
                    document.getElementById('finalForm').submit();
                }
            };
            new Razorpay(options).open();
        }
    </script>
</body>
                                                  </html>
