<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container py-5 bg-light">
    <div class="card p-4 shadow mx-auto border-0" style="max-width: 380px; border-radius: 15px;">
        <h4 class="text-center fw-bold text-primary mb-4">Driver Login</h4>
        <form method="POST">
            <div class="mb-3">
                <label class="small fw-bold">Phone Number</label>
                <input type="number" name="phone" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="small fw-bold">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">LOGIN TO DASHBOARD</button>
            <hr>
            <a href="/driver_reg" class="btn btn-outline-secondary btn-sm w-100">Nayi Gadi Register Karein</a>
        </form>
    </div>
</body>
              </html>
