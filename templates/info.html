<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{ title }} - Yourtickets</title>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .info-card { 
            max-width: 600px; 
            margin: 50px auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            border-top: 5px solid #0d6efd;
        }
        h2 { color: #212529; font-weight: 700; margin-bottom: 20px; }
        .content-area { color: #495057; line-height: 1.8; font-size: 1.1rem; }
        .btn-home { margin-top: 30px; border-radius: 10px; font-weight: 600; padding: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="info-card">
        <h2>{{ title }}</h2>
        <hr>
        <div class="content-area">
            {{ content | safe }}
        </div>
        <a href="/" class="btn btn-dark w-100 btn-home">BACK TO HOME</a>
    </div>
</div>

</body>
</html>
