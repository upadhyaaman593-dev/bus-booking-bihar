<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Select Seat - {{ bus.bus_name }}</title>
    <style>
        .seat-container { max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .deck-title { font-size: 0.8rem; color: #666; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #eee; margin-bottom: 10px; padding-bottom: 5px; }
        .bus-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .seat { 
            height: 45px; border: 1px solid #ddd; border-radius: 8px; 
            text-align: center; line-height: 45px; cursor: pointer; font-weight: bold; font-size: 0.9rem;
        }
        .booked { background-color: #dee2e6 !important; color: #adb5bd; cursor: not-allowed; border: none; }
        .selected { background-color: #007bff !important; color: white; border: none; }
        .window-seat { border: 2px solid #0d6efd !important; background-color: #f0f7ff; color: #0d6efd; }
        .legend { display: flex; justify-content: space-around; margin-top: 20px; font-size: 0.75rem; }
        .legend-box { width: 12px; height: 12px; display: inline-block; border-radius: 3px; margin-right: 4px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="seat-container">
        <h5 class="fw-bold mb-1">{{ bus.bus_name }}</h5>
        <p class="text-muted small mb-4">{{ bus.route_from }} ➔ {{ bus.route_to }}</p>

        <div class="deck-title">Lower Deck</div>
        <div class="bus-grid">
            {% for i in range(1, 21) %}
                {% set s_no = i|string %}
                <div id="seat-{{ s_no }}" 
                     class="seat {% if s_no in booked_seats %} booked {% elif s_no in window_seats %} window-seat {% endif %}"
                     onclick="selectSeat('{{ s_no }}')">{{ s_no }}</div>
            {% endfor %}
        </div>

        <div class="deck-title">Upper Deck</div>
        <div class="bus-grid">
            {% for i in range(21, 41) %}
                {% set s_no = i|string %}
                <div id="seat-{{ s_no }}" 
                     class="seat {% if s_no in booked_seats %} booked {% elif s_no in window_seats %} window-seat {% endif %}"
                     onclick="selectSeat('{{ s_no }}')">{{ s_no }}</div>
            {% endfor %}
        </div>

        <div class="legend">
            <div><span class="legend-box border"></span> Available</div>
            <div><span class="legend-box window-seat" style="border: 1px solid blue;"></span> Window</div>
            <div><span class="legend-box booked"></span> Booked</div>
        </div>

        <form action="/process_booking" method="POST" class="mt-4 border-top pt-4">
            <input type="hidden" name="bus_id" value="{{ bus.id }}">
            <input type="hidden" name="seat_no" id="selected_seat" required>
            
            <div class="row g-2">
                <div class="col-12 mb-2">
                    <input type="text" name="p_name" class="form-control" placeholder="Passenger Name" required>
                </div>
                <div class="col-12 mb-3">
                    <input type="number" name="p_mobile" class="form-control" placeholder="Mobile Number" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">CONFIRM BOOKING</button>
        </form>
    </div>
</div>

<script>
    function selectSeat(id) {
        let seatEl = document.getElementById('seat-' + id);
        if (seatEl.classList.contains('booked')) return;
        document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
        seatEl.classList.add('selected');
        document.getElementById('selected_seat').value = id;
    }
</script>

</body>
</html>
