<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Select Seat - {{ bus.bus_name }}</title>
    <style>
        .seat-container { max-width: 500px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .deck-header { font-weight: bold; color: #555; background: #f8f9fa; padding: 5px 10px; border-radius: 5px; margin: 15px 0 10px 0; font-size: 0.9rem; text-align: center; border: 1px solid #eee; }
        .bus-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .seat { height: 45px; border: 1px solid #ddd !important; border-radius: 8px; text-align: center; line-height: 45px; cursor: pointer; font-weight: bold; font-size: 0.85rem; background-color: #fff; transition: 0.3s; }
        
        /* Special Classes */
        .is-window { border: 2px solid #0d6efd !important; background-color: #f0f7ff !important; color: #0d6efd !important; }
        .booked { background-color: #dee2e6 !important; color: #adb5bd !important; cursor: not-allowed; border: none !important; }
        .selected { background-color: #0d6efd !important; color: white !important; border: none !important; transform: scale(1.05); }
        
        #display_seat_no { font-size: 1.2rem; color: #0d6efd; font-weight: bold; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="seat-container shadow">
        <h5 class="fw-bold text-center mb-1">{{ bus.bus_name }}</h5>
        <p class="text-center text-muted small mb-3">Route: {{ bus.route_from }} To {{ bus.route_to }}</p>

        <div class="text-center bg-light p-2 rounded mb-3 border">
            Selected Seat: <span id="display_seat_no">None</span>
        </div>

        <div class="deck-header">LOWER DECK</div>
        <div class="bus-grid mb-4">
            {% for i in range(1, 21) %}
                {% set s_id = i|string %}
                <div id="seat-{{ s_id }}" 
                     class="seat {% if s_id in booked_seats %} booked {% elif s_id in window_seats %} is-window {% endif %}"
                     onclick="selectSeat('{{ s_id }}', 'LOW')">
                    {{ s_id }}
                </div>
            {% endfor %}
        </div>

        <div class="deck-header">UPPER DECK</div>
        <div class="bus-grid">
            {% for i in range(21, 41) %}
                {% set s_id = i|string %}
                <div id="seat-{{ s_id }}" 
                     class="seat {% if s_id in booked_seats %} booked {% elif s_id in window_seats %} is-window {% endif %}"
                     onclick="selectSeat('{{ s_id }}', 'UP')">
                    {{ s_id }}
                </div>
            {% endfor %}
        </div>

        <form action="/process_booking" method="POST" class="mt-4 border-top pt-3">
            <input type="hidden" name="bus_id" value="{{ bus.id }}">
            <input type="hidden" name="seat_no" id="hidden_seat_input" required>
            
            <div class="mb-3">
                <label class="form-label small fw-bold">Passenger Name</label>
                <input type="text" name="p_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Mobile Number</label>
                <input type="number" name="p_mobile" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">CONFIRM BOOKING</button>
        </form>
    </div>
</div>

<script>
    function selectSeat(num, deck) {
        // Find the clicked element
        let seatEl = document.getElementById('seat-' + num);
        
        // Agar booked hai toh return
        if (seatEl.classList.contains('booked')) return;
        
        // Purani selection clear karein
        document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
        
        // Nayi selection add karein
        seatEl.classList.add('selected');
        
        // Format the display (e.g., UP 21 or LOW 5)
        let formattedSeat = deck + " " + num;
        
        // UI update
        document.getElementById('display_seat_no').innerText = formattedSeat;
        
        // Hidden input update (Jo server pe jayega)
        document.getElementById('hidden_seat_input').value = formattedSeat;
    }
</script>
</body>
</html>
